version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: campus_collab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campus_collab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campus_collab"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
